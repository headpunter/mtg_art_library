worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # SSI — used to inject shared nav fragment into service HTML responses
    ssi on;
    ssi_silent_errors on;

    upstream art_library  { server art_library:5001; }
    upstream deck_primer  { server deck_primer:5002; }
    upstream collection_rec { server collection_rec:5003; }
    upstream deck_builder { server deck_builder:5004; }
    upstream core         { server core:5000; }

    server {
        listen 80;
        server_name _;

        # Shared static assets (nav CSS/JS)
        location /shared/ {
            alias /usr/share/nginx/shared/;
            expires 1h;
        }

        # SSI nav fragment — served from file generated by entrypoint.sh
        location /_nav {
            alias /usr/share/nginx/html/nav.html;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # Core internal API (not directly user-facing, but accessible for debugging)
        location /core/ {
            proxy_pass http://core/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Deck Primer module
        location /primer/ {
            proxy_pass http://deck_primer/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
            error_page 502 503 504 @module_disabled;
        }

        # Collection Recommendation module
        location /collection/ {
            proxy_pass http://collection_rec/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
            error_page 502 503 504 @module_disabled;
        }

        # Deck Builder module
        location /builder/ {
            proxy_pass http://deck_builder/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
            error_page 502 503 504 @module_disabled;
        }

        # Art Library — root path, long timeout for GPU upscaler jobs
        location / {
            proxy_pass http://art_library;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            client_max_body_size 210m;
            error_page 502 503 504 @module_disabled;
        }

        # Fallback page when a module container is not running
        location @module_disabled {
            root /usr/share/nginx/html;
            rewrite ^ /module_disabled.html break;
            internal;
        }
    }
}
