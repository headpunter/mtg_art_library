<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}MTG Art Library{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ ver }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body data-page="{% block page_id %}{% endblock %}">

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">⌬</span>
    <span class="brand-name">art library</span>
  </div>
  <nav class="nav">
    <a href="{{ url_for('library_view') }}"
       class="nav-item {% if request.endpoint == 'library_view' %}active{% endif %}">
      Library
    </a>
    <a href="{{ url_for('decklists_view') }}"
       class="nav-item {% if request.endpoint == 'decklists_view' %}active{% endif %}">
      Decklists
    </a>
    <a href="{{ url_for('build_view') }}"
       class="nav-item {% if request.endpoint == 'build_view' %}active{% endif %}">
      Build Deck
    </a>
    <a href="{{ url_for('page_cardbacks') }}"
       class="nav-item {% if request.endpoint == 'page_cardbacks' %}active{% endif %}">
      Cardbacks
    </a>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<div class="job-tray" id="jobTray" hidden></div>
<button class="back-to-top" id="backToTop" aria-label="Back to top" hidden>↑</button>

<script src="{{ url_for('static', filename='app.js') }}?v={{ ver }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
